<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>GPS TEST</title>
</head>

<body>
<h1 id="status">GPS待機中...</h1>

<script>
navigator.geolocation.watchPosition(
  (pos) => {
    document.getElementById("status").innerText =
      "OK: " + pos.coords.latitude + ", " + pos.coords.longitude;
  },
  (err) => {
    document.getElementById("status").innerText =
      "ERROR: " + err.message;
  },
  { enableHighAccuracy: true }
);
</script>

</body>
</html>
