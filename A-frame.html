<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

    <title>GPS AR Debug</title>

    <script src="https://aframe.io/releases/1.0.4/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
        #debug {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px;
            font-size: 14px;
            z-index: 9999;
            font-family: sans-serif;
        }
    </style>
</head>

<body style="margin:0; overflow:hidden;">

<div id="debug">GPS取得中...</div>

<a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; debugUIEnabled: false;">

    <!-- 目的地の箱 -->
    <a-box
        color="red"
        gps-entity-place="latitude: 37.956038611893014; longitude: 139.33747326612726;"
        scale="50 50 50">
    </a-box>

    <!-- カメラ -->
    <a-camera gps-camera rotation-reader></a-camera>

</a-scene>

<script>
let debug = document.getElementById("debug");

function updatePosition(pos) {
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;
    let acc = pos.coords.accuracy;

    debug.innerHTML =
        "現在地<br>" +
        "緯度: " + lat + "<br>" +
        "経度: " + lon + "<br>" +
        "精度: " + acc + "m";
}

function error(err) {
    debug.innerHTML = "GPS取得失敗: " + err.message;
}

navigator.geolocation.watchPosition(updatePosition, error, {
    enableHighAccuracy: true
});
</script>

</body>
</html>
