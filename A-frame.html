<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, user-scalable=no">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <!-- AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
      font-family: sans-serif;
    }

    #overlay {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 9999;
      color: white;
      background: rgba(0,0,0,0.6);
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 14px;
    }
  </style>
</head>

<body>

<div id="overlay">
  Hiroマーカーを映してください
</div>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="antialias: true; alpha: true"
  arjs="
    sourceType: webcam;
    debugUIEnabled: false;
  "
>

  <!-- ===== アセット ===== -->
  <a-assets>
    <!-- ✅ ファイル名の大文字小文字に注意 -->
    <a-asset-item
      id="trainModel"
      src="kisya_4.glb">
    </a-asset-item>
  </a-assets>

  <!-- ===== ライト ===== -->
  <a-entity
    light="type: ambient; intensity: 1.4">
  </a-entity>

  <a-entity
    light="type: directional; intensity: 2"
    position="1 3 2">
  </a-entity>

  <!-- ===== Hiroマーカー ===== -->
  <a-marker preset="hiro">

    <a-entity
      gltf-model="#trainModel"
      scale="0.4 0.4 0.4"
      position="0 0 0"
      rotation="0 0 0"
      animation="
        property: rotation;
        to: 0 360 0;
        dur: 12000;
        loop: true;
        easing: linear;
      ">
    </a-entity>

  </a-marker>

  <!-- ===== カメラ ===== -->
  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
