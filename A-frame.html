<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Location Based AR Sample</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- AR.js (Location Based) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <!-- ARシーン -->
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; gpsMinDistance: 5; gpsTimeInterval: 3000;"
    >
      <!-- カメラ（GPS対応） -->
      <a-camera gps-camera rotation-reader></a-camera>

      <!-- 指定位置に3Dオブジェクトを配置 -->
      <a-box
        gps-entity-place="latitude: 37.95611, 139.337891; longitude:139.337891;"
        color="red"
        depth="2"
        height="2"
        width="2"
      ></a-box>
    </a-scene>
  </body>
</html>
