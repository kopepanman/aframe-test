<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <!-- ✅ 正しい A-Frame -->
  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>

  <!-- ✅ 正しい AR.js -->
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }
  </style>
</head>

<body>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="antialias: true; alpha: true"
  arjs="sourceType: webcam; debugUIEnabled: false;"
>

  <!-- ✅ 正しい assets -->
  <a-assets>
    <a-asset-item id="model" src="./kisya_4.glb"></a-asset-item>
  </a-assets>

  <!-- ライト -->
  <a-entity light="type: ambient; intensity: 1.5"></a-entity>
  <a-entity
    light="type: directional; intensity: 2"
    position="1 3 2">
  </a-entity>

  <!-- Hiroマーカー -->
  <a-marker preset="hiro">

    <a-entity
      gltf-model="#model"

      <!-- ✅ 小さいサイズ（ここが効く） -->
      scale="0.03 0.03 0.03"

      position="0 0.02 0"
      rotation="0 0 0"

      animation="
        property: rotation;
        to: 0 360 0;
        dur: 12000;
        loop: true;
        easing: linear;
      ">
    </a-entity>

  </a-marker>

  <!-- カメラ -->
  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
