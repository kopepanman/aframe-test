<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    /* ✅ AR.js の文字・UIを完全に消す */
    .arjs-loader,
    .arjs-loader div,
    .a-enter-vr {
      display: none !important;
    }
  </style>
</head>

<body>

<a-scene
  embedded
  vr-mode-ui="enabled: false"
  renderer="antialias:true; alpha:true"
  arjs="sourceType:webcam; debugUIEnabled:false;"
>

  <a-assets>
    <a-asset-item id="model" src="./kisya_4.glb"></a-asset-item>
  </a-assets>

  <a-entity light="type:ambient; intensity:1.5"></a-entity>
  <a-entity light="type:directional; intensity:2" position="1 3 2"></a-entity>

  <a-marker preset="hiro">
    <a-entity
      gltf-model="#model"
      scale="0.2 0.2 0.2"
      position="0 0.02 0"
      animation="property: rotation; to: 0 360 0; dur: 12000; loop: true">
    </a-entity>
  </a-marker>

  <a-entity camera></a-entity>

</a-scene>

</body>
</html>
