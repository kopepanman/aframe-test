<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Location Based AR Sample</title>
    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <!-- AR.js (Location Based) -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
  </head>
  <body style="margin: 0; overflow: hidden;">
    <!-- ARシーン -->
    <a-scene
      vr-mode-ui="enabled: false"
      embedded
      arjs="sourceType: webcam; gpsMinDistance: 5; gpsTimeInterval: 3000;"
    >
      <!-- カメラ（GPS対応） -->
      <a-camera gps-camera rotation-reader></a-camera>

      <!-- 指定位置に3Dオブジェクトを配置 -->
      <a-box
        gps-entity-place="latitude: 37.95611, 139.337891; longitude:139.337891;"
        color="red"
        depth="2"
        height="2"
        width="2"
      ></a-box>
    </a-scene>
  </body>
</html>
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Location Based AR Sample</title>

    <!-- A-Frame -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <!-- AR.js -->
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>

    <style>
        #debug {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            color: #00ff00;
            padding: 10px;
            font-size: 15px;
            z-index: 9999;
            font-family: monospace;
            white-space: pre-line;
        }
    </style>
</head>

<body style="margin:0; overflow:hidden;">

<div id="debug">
GPS取得待機中...
</div>

<a-scene
    vr-mode-ui="enabled: false"
    embedded
    arjs="sourceType: webcam; gpsMinDistance:5; gpsTimeInterval:1000;"
>

    <a-camera gps-camera rotation-reader></a-camera>

    <a-box
        gps-entity-place="latitude:37.95611; longitude:139.337891;"
        color="red"
        width="2"
        height="2"
        depth="2">
    </a-box>

</a-scene>

<script>
const debug = document.getElementById("debug");

if (navigator.geolocation) {

    navigator.geolocation.watchPosition(function(position){

        const lat = position.coords.latitude;
        const lon = position.coords.longitude;
        const acc = position.coords.accuracy;

        debug.innerHTML =
            "現在位置\n" +
            "緯度 : " + lat.toFixed(8) + "\n" +
            "経度 : " + lon.toFixed(8) + "\n" +
            "GPS精度 : " + acc.toFixed(1) + " m";

    }, function(err){

        debug.innerHTML = "GPSエラー\n" + err.message;

    },{
        enableHighAccuracy:true,
        maximumAge:0,
        timeout:10000
    });

}else{

    debug.innerHTML="Geolocation未対応";

}
</script>

</body>
</html>
